<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__VYBRIDGE_TITLE__</title>
  <meta name="description" content="__VYBRIDGE_DESCRIPTION__">
  __VYBRIDGE_HEAD_EXTRA__
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/sites/sites.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="/" class="logo">
        <img src="/assets/logo-icon.svg" alt="" class="logo__icon" width="36" height="36">
        <span class="logo__text">vybridge</span>
      </a>
      <nav class="nav">
        <a href="/sites" class="nav__link">Marketplace</a>
      </nav>
      <div class="header__actions">
        <a href="/login" class="header__login">Log in</a>
        <a href="/register" class="btn btn--purple btn--sm">Sign up</a>
      </div>
    </div>
  </header>

  <main class="public-page marketplace-page">
    <div class="container">
      <nav class="breadcrumbs"><a href="/">Home</a> → <span>Marketplace</span></nav>

      <h1 class="marketplace-title">Marketplace</h1>
      <p class="marketplace-subtitle">Discover advertising opportunities across websites, creators and digital media.</p>

      <div class="marketplace-filters" id="marketplaceFilters" hidden>
        <div class="marketplace-filter">
          <label for="filterCategory">Category</label>
          <select id="filterCategory"><option value="">All categories</option></select>
        </div>
        <div class="marketplace-filter">
          <label for="filterCountry">Country</label>
          <select id="filterCountry"><option value="">All countries</option></select>
        </div>
        <div class="marketplace-filter">
          <label for="filterLanguage">Language</label>
          <select id="filterLanguage"><option value="">All languages</option></select>
        </div>
        <div class="marketplace-filter">
          <label for="filterFormat">Format</label>
          <select id="filterFormat"><option value="">All formats</option></select>
        </div>
        <button type="button" class="marketplace-filters__clear" id="filtersClear" hidden>Clear filters</button>
      </div>

      <p class="marketplace-results-count" id="resultsCount" hidden></p>

      <p class="dashboard-loading" id="catalogLoading">Loading…</p>
      <div class="sites-grid" id="sitesGrid"></div>
      <p class="dashboard-empty" id="sitesEmpty" hidden>No active placements yet. Check back soon.</p>
      <p class="dashboard-empty" id="sitesNoMatch" hidden>No sites match your filters. <button type="button" id="noMatchClear" class="marketplace-filters__clear marketplace-filters__clear--inline">Clear filters</button></p>
    </div>
  </main>

  <footer class="simple-footer">
    <div class="container simple-footer__inner">
      <span>© 2026 Vybridge</span>
    </div>
  </footer>
  <script src="/script.js"></script>
  <script src="/sites/catalog.js"></script>
</body>
</html>
