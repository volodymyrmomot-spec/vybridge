<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__VYBRIDGE_TITLE__</title>
  <meta name="description" content="__VYBRIDGE_DESCRIPTION__">
  __VYBRIDGE_HEAD_EXTRA__
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/sites/sites.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="/" class="logo">
        <img src="/assets/logo-icon.svg" alt="" class="logo__icon" width="36" height="36">
        <span class="logo__text">vybridge</span>
      </a>
      <div class="header__actions">
        <a href="/login" class="header__login">Log in</a>
        <a href="/register" class="btn btn--purple btn--sm">Sign up</a>
      </div>
    </div>
  </header>

  <main class="public-page">
    <div class="container">
      <nav class="breadcrumbs" id="breadcrumbs">__VYBRIDGE_BREADCRUMBS__</nav>

      <p class="dashboard-loading" id="siteLoading">Loading…</p>
      <p class="dashboard-empty" id="siteNotFound" hidden>This site isn't available.</p>

      <div id="siteBody" hidden>
        <div class="site-cover" id="siteCover"></div>
        <h1 class="site-domain" id="siteDomain"></h1>
        <dl class="site-meta" id="siteMeta"></dl>
        <p class="site-description" id="siteDescription" hidden></p>

        <h2 class="public-section-title">Ad placements</h2>
        <div class="listings-grid" id="listingsGrid"></div>
        <p class="dashboard-empty" id="listingsEmpty" hidden>No active placements on this site yet.</p>
      </div>
    </div>
  </main>

  <footer class="simple-footer">
    <div class="container simple-footer__inner">
      <span>© 2026 Vybridge</span>
    </div>
  </footer>
  <script src="/sites/sites.js"></script>
</body>
</html>
