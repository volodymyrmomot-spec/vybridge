<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vybridge — Create your account</title>
  <meta name="description" content="Create your Vybridge account as an advertiser or publisher.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/auth/auth.css">
  <link rel="stylesheet" href="/register/register.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="/" class="logo">
        <img src="/assets/logo-icon.svg" alt="" class="logo__icon" width="36" height="36">
        <span class="logo__text">vybridge</span>
      </a>
      <div class="header__actions">
        <a href="/login" class="header__login">Log in</a>
      </div>
    </div>
  </header>

  <main class="register-page">
    <div class="container register-container">
      <h1 class="register-title">Create your account</h1>

      <div class="role-select" id="roleSelect">
        <button type="button" class="role-card" id="roleAdvertiser" data-role="advertiser" aria-expanded="false">
          <span class="role-card__icon role-card__icon--purple">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l18-5v12L3 13v-2z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
          </span>
          <span class="role-card__label">I want to advertise</span>
        </button>
        <button type="button" class="role-card" id="rolePublisher" data-role="publisher" aria-expanded="false">
          <span class="role-card__icon role-card__icon--green">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </span>
          <span class="role-card__label">I want to earn from my site</span>
        </button>
        <button type="button" class="role-card" id="roleBlogger" data-role="blogger" aria-expanded="false">
          <span class="role-card__icon role-card__icon--purple">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="14" height="12" rx="2"/><path d="M16 10l6-3v10l-6-3"/></svg>
          </span>
          <span class="role-card__label">I'm a blogger / influencer</span>
        </button>
      </div>

      <form id="advertiserForm" class="register-form" novalidate hidden>
        <div class="form-field">
          <label class="form-field__label" for="advName">Name or company</label>
          <input class="form-field__input" type="text" id="advName" name="name" autocomplete="name">
          <p class="form-field__error" id="advNameError" hidden></p>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="advEmail">Email</label>
          <input class="form-field__input" type="email" id="advEmail" name="email" autocomplete="email">
          <p class="form-field__error" id="advEmailError" hidden></p>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="advPassword">Password</label>
          <input class="form-field__input" type="password" id="advPassword" name="password" autocomplete="new-password">
          <p class="form-field__error" id="advPasswordError" hidden></p>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="advCountry">Country</label>
          <select class="form-field__input" id="advCountry" name="country">
            <option value="">Select country</option>
          </select>
          <p class="form-field__error" id="advCountryError" hidden></p>
        </div>
        <button type="submit" class="btn btn--purple btn--lg register-submit">Create advertiser account</button>
        <p class="form-message form-message--error" id="advFormMessage" hidden></p>
      </form>

      <form id="publisherForm" class="register-form" novalidate hidden>
        <div class="form-field">
          <label class="form-field__label" for="pubName">Name</label>
          <input class="form-field__input" type="text" id="pubName" name="name" autocomplete="name">
          <p class="form-field__error" id="pubNameError" hidden></p>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="pubEmail">Email</label>
          <input class="form-field__input" type="email" id="pubEmail" name="email" autocomplete="email">
          <p class="form-field__error" id="pubEmailError" hidden></p>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="pubPassword">Password</label>
          <input class="form-field__input" type="password" id="pubPassword" name="password" autocomplete="new-password">
          <p class="form-field__error" id="pubPasswordError" hidden></p>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="pubWebsite">Website URL</label>
          <input class="form-field__input" type="url" id="pubWebsite" name="websiteUrl" placeholder="https://example.com" autocomplete="url">
          <p class="form-field__error" id="pubWebsiteError" hidden></p>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="pubCountry">Country</label>
          <select class="form-field__input" id="pubCountry" name="country">
            <option value="">Select country</option>
          </select>
          <p class="form-field__error" id="pubCountryError" hidden></p>
        </div>
        <button type="submit" class="btn btn--purple btn--lg register-submit">Create publisher account</button>
        <p class="form-message form-message--error" id="pubFormMessage" hidden></p>
      </form>

      <form id="bloggerForm" class="register-form" novalidate hidden>
        <div class="form-field">
          <label class="form-field__label" for="blgName">Name</label>
          <input class="form-field__input" type="text" id="blgName" name="name" autocomplete="name">
          <p class="form-field__error" id="blgNameError" hidden></p>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="blgEmail">Email</label>
          <input class="form-field__input" type="email" id="blgEmail" name="email" autocomplete="email">
          <p class="form-field__error" id="blgEmailError" hidden></p>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="blgPassword">Password</label>
          <input class="form-field__input" type="password" id="blgPassword" name="password" autocomplete="new-password">
          <p class="form-field__error" id="blgPasswordError" hidden></p>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="blgCountry">Country</label>
          <select class="form-field__input" id="blgCountry" name="country">
            <option value="">Select country</option>
          </select>
          <p class="form-field__error" id="blgCountryError" hidden></p>
        </div>

        <div class="channels-block">
          <h2 class="channels-block__title">My channels</h2>
          <p class="channels-block__hint">Add at least one — Instagram, TikTok, or YouTube.</p>
          <p class="form-field__error" id="channelsError" hidden></p>

          <div class="channel-row" data-platform="instagram">
            <div class="channel-row__header">
              <span class="channel-row__icon">📷</span>
              <span class="channel-row__label">Instagram</span>
            </div>
            <div class="form-field">
              <label class="form-field__label" for="channelInstagramUrl">Profile URL</label>
              <input class="form-field__input" type="url" id="channelInstagramUrl" placeholder="https://instagram.com/yourhandle">
              <p class="form-field__error" id="channelInstagramUrlError" hidden></p>
            </div>
            <div class="channel-row__grid">
              <div class="form-field">
                <label class="form-field__label" for="channelInstagramFollowers">Followers</label>
                <input class="form-field__input" type="number" id="channelInstagramFollowers" min="0" step="1" placeholder="10000">
                <p class="form-field__error" id="channelInstagramFollowersError" hidden></p>
              </div>
              <div class="form-field">
                <label class="form-field__label" for="channelInstagramPrice">Price per post (EUR)</label>
                <input class="form-field__input" type="number" id="channelInstagramPrice" min="1" step="0.01" placeholder="50.00">
                <p class="form-field__error" id="channelInstagramPriceError" hidden></p>
              </div>
            </div>
            <div class="form-field">
              <label class="form-field__label" for="channelInstagramCategory">Content category</label>
              <select class="form-field__input" id="channelInstagramCategory">
                <option value="">Select category</option>
                <option value="technology">Technology</option>
                <option value="lifestyle">Lifestyle</option>
                <option value="automotive">Automotive</option>
                <option value="fashion">Fashion</option>
                <option value="food">Food</option>
                <option value="travel">Travel</option>
                <option value="sports">Sports</option>
                <option value="business">Business</option>
                <option value="entertainment">Entertainment</option>
                <option value="education">Education</option>
                <option value="health">Health</option>
                <option value="news">News</option>
                <option value="other">Other</option>
              </select>
              <p class="form-field__error" id="channelInstagramCategoryError" hidden></p>
            </div>
          </div>

          <div class="channel-row" data-platform="tiktok">
            <div class="channel-row__header">
              <span class="channel-row__icon">🎵</span>
              <span class="channel-row__label">TikTok</span>
            </div>
            <div class="form-field">
              <label class="form-field__label" for="channelTiktokUrl">Profile URL</label>
              <input class="form-field__input" type="url" id="channelTiktokUrl" placeholder="https://tiktok.com/@yourhandle">
              <p class="form-field__error" id="channelTiktokUrlError" hidden></p>
            </div>
            <div class="channel-row__grid">
              <div class="form-field">
                <label class="form-field__label" for="channelTiktokFollowers">Followers</label>
                <input class="form-field__input" type="number" id="channelTiktokFollowers" min="0" step="1" placeholder="10000">
                <p class="form-field__error" id="channelTiktokFollowersError" hidden></p>
              </div>
              <div class="form-field">
                <label class="form-field__label" for="channelTiktokPrice">Price per post (EUR)</label>
                <input class="form-field__input" type="number" id="channelTiktokPrice" min="1" step="0.01" placeholder="50.00">
                <p class="form-field__error" id="channelTiktokPriceError" hidden></p>
              </div>
            </div>
            <div class="form-field">
              <label class="form-field__label" for="channelTiktokCategory">Content category</label>
              <select class="form-field__input" id="channelTiktokCategory">
                <option value="">Select category</option>
                <option value="technology">Technology</option>
                <option value="lifestyle">Lifestyle</option>
                <option value="automotive">Automotive</option>
                <option value="fashion">Fashion</option>
                <option value="food">Food</option>
                <option value="travel">Travel</option>
                <option value="sports">Sports</option>
                <option value="business">Business</option>
                <option value="entertainment">Entertainment</option>
                <option value="education">Education</option>
                <option value="health">Health</option>
                <option value="news">News</option>
                <option value="other">Other</option>
              </select>
              <p class="form-field__error" id="channelTiktokCategoryError" hidden></p>
            </div>
          </div>

          <div class="channel-row" data-platform="youtube">
            <div class="channel-row__header">
              <span class="channel-row__icon">▶️</span>
              <span class="channel-row__label">YouTube</span>
            </div>
            <div class="form-field">
              <label class="form-field__label" for="channelYoutubeUrl">Channel URL</label>
              <input class="form-field__input" type="url" id="channelYoutubeUrl" placeholder="https://youtube.com/@yourhandle">
              <p class="form-field__error" id="channelYoutubeUrlError" hidden></p>
            </div>
            <div class="channel-row__grid">
              <div class="form-field">
                <label class="form-field__label" for="channelYoutubeFollowers">Subscribers</label>
                <input class="form-field__input" type="number" id="channelYoutubeFollowers" min="0" step="1" placeholder="10000">
                <p class="form-field__error" id="channelYoutubeFollowersError" hidden></p>
              </div>
              <div class="form-field">
                <label class="form-field__label" for="channelYoutubePrice">Price per post (EUR)</label>
                <input class="form-field__input" type="number" id="channelYoutubePrice" min="1" step="0.01" placeholder="50.00">
                <p class="form-field__error" id="channelYoutubePriceError" hidden></p>
              </div>
            </div>
            <div class="form-field">
              <label class="form-field__label" for="channelYoutubeCategory">Content category</label>
              <select class="form-field__input" id="channelYoutubeCategory">
                <option value="">Select category</option>
                <option value="technology">Technology</option>
                <option value="lifestyle">Lifestyle</option>
                <option value="automotive">Automotive</option>
                <option value="fashion">Fashion</option>
                <option value="food">Food</option>
                <option value="travel">Travel</option>
                <option value="sports">Sports</option>
                <option value="business">Business</option>
                <option value="entertainment">Entertainment</option>
                <option value="education">Education</option>
                <option value="health">Health</option>
                <option value="news">News</option>
                <option value="other">Other</option>
              </select>
              <p class="form-field__error" id="channelYoutubeCategoryError" hidden></p>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn--purple btn--lg register-submit">Create blogger account</button>
        <p class="form-message form-message--error" id="blgFormMessage" hidden></p>
      </form>

      <p class="auth-footer-link">Already have an account? <a href="/login">Log in</a></p>
    </div>
  </main>

  <footer class="simple-footer">
    <div class="container simple-footer__inner">
      <span>© 2026 Vybridge</span>
    </div>
  </footer>
  <script src="/auth/i18n.js"></script>
  <script src="/auth/auth.js"></script>
  <script src="/auth/countries.js"></script>
  <script src="/register/register.js"></script>
</body>
</html>
