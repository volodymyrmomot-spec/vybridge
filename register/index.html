<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vybridge — Sign up</title>
  <meta name="description" content="Create your Vybridge account as an advertiser or publisher.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/auth/page.css">
  <link rel="stylesheet" href="/auth/auth.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="/index.html" class="logo">
        <img src="/assets/logo-icon.svg" alt="" class="logo__icon" width="36" height="36">
        <span class="logo__text">vybridge</span>
      </a>
      <div class="header__actions">
        <a href="/login" class="header__login">Log in</a>
      </div>
    </div>
  </header>

  <main class="auth-page">
    <div class="container">
      <div class="auth-card">
        <h1 class="auth-card__title">Sign up</h1>
        <p class="auth-card__subtitle">Create your account and choose whether you want to buy or sell advertising.</p>

        <form id="registerForm" class="auth-form" novalidate>
          <div class="form-field">
            <label class="form-field__label" for="name">Name</label>
            <input class="form-field__input" type="text" id="name" name="name" autocomplete="name" required>
          </div>

          <div class="form-field">
            <label class="form-field__label" for="email">Email</label>
            <input class="form-field__input" type="email" id="email" name="email" autocomplete="email" required>
          </div>

          <div class="form-field">
            <label class="form-field__label" for="password">Password</label>
            <input class="form-field__input" type="password" id="password" name="password" autocomplete="new-password" minlength="8" required>
          </div>

          <fieldset class="form-field" style="border:0;padding:0;margin:0;">
            <legend class="form-field__label">Role</legend>
            <div class="role-options">
              <label class="role-option">
                <input type="radio" name="role" value="advertiser" required>
                <span class="role-option__label">I want to buy advertising</span>
              </label>
              <label class="role-option">
                <input type="radio" name="role" value="publisher" required>
                <span class="role-option__label">I want to offer advertising space</span>
              </label>
            </div>
          </fieldset>

          <button type="submit" class="btn btn--brand">Create account</button>
          <p id="registerMessage" class="form-message" hidden></p>
        </form>

        <p class="auth-footer-link">Already have an account? <a href="/login">Log in</a></p>
      </div>
    </div>
  </main>

  <footer class="simple-footer">
    <div class="container simple-footer__inner">
      <span>© 2026 Vybridge</span>
    </div>
  </footer>
  <script src="/auth/i18n.js"></script>
  <script src="/auth/auth.js"></script>
  <script src="/register/register.js"></script>
</body>
</html>
