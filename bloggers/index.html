<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vybridge — Browse bloggers</title>
  <meta name="description" content="Browse bloggers and influencers on Vybridge.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/auth/auth.css">
  <link rel="stylesheet" href="/slots/slots.css">
  <link rel="stylesheet" href="/bloggers/bloggers.css">
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="/" class="logo">
        <img src="/assets/logo-icon.svg" alt="" class="logo__icon" width="36" height="36">
        <span class="logo__text">vybridge</span>
      </a>
      <div class="header__actions">
        <a href="/dashboard" class="header__login">Back to dashboard</a>
      </div>
    </div>
  </header>

  <main class="catalog-page">
    <div class="container">
      <h1 class="dashboard-title">Browse bloggers</h1>

      <div class="catalog-filters" id="catalogFilters" hidden>
        <div class="catalog-filters__field">
          <label class="catalog-filters__label" for="filterPlatform">Platform</label>
          <select class="catalog-filters__select" id="filterPlatform">
            <option value="">All platforms</option>
            <option value="instagram">📷 Instagram</option>
            <option value="tiktok">🎵 TikTok</option>
            <option value="youtube">▶️ YouTube</option>
          </select>
        </div>

        <div class="catalog-filters__field">
          <label class="catalog-filters__label" for="filterCategory">Category</label>
          <select class="catalog-filters__select" id="filterCategory">
            <option value="">All categories</option>
            <option value="technology">💻 Technology</option>
            <option value="lifestyle">🧘 Lifestyle</option>
            <option value="automotive">🚗 Automotive</option>
            <option value="fashion">👗 Fashion</option>
            <option value="food">🍔 Food</option>
            <option value="travel">✈️ Travel</option>
            <option value="sports">⚽ Sports</option>
            <option value="business">💼 Business</option>
            <option value="entertainment">🎬 Entertainment</option>
            <option value="education">🎓 Education</option>
            <option value="health">❤️ Health</option>
            <option value="news">📰 News</option>
            <option value="other">📦 Other</option>
          </select>
        </div>

        <div class="catalog-filters__field">
          <label class="catalog-filters__label" for="filterFollowers">Followers</label>
          <select class="catalog-filters__select" id="filterFollowers">
            <option value="">Any size</option>
            <option value="under_1k">Under 1,000</option>
            <option value="1k_10k">1,000 – 10,000</option>
            <option value="10k_50k">10,000 – 50,000</option>
            <option value="50k_200k">50,000 – 200,000</option>
            <option value="200k_plus">200,000+</option>
          </select>
        </div>
      </div>

      <p class="dashboard-loading" id="catalogLoading">Loading…</p>
      <div class="bloggers-grid" id="bloggersGrid" hidden></div>
      <p class="dashboard-empty" id="bloggersEmpty" hidden>No bloggers available right now — check back soon.</p>
      <p class="dashboard-empty" id="bloggersFilteredEmpty" hidden>No bloggers match these filters — try widening your search.</p>
    </div>
  </main>

  <div class="modal-backdrop" id="offerBackdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="offerModalTitle">
      <button type="button" class="modal__close" id="offerModalCloseBtn" aria-label="Close">&times;</button>
      <h2 class="modal__title" id="offerModalTitle">Make an offer</h2>
      <p class="modal__subtitle" id="offerBloggerInfo"></p>

      <form id="offerForm" novalidate>
        <div class="form-field" id="offerChannelFieldWrap">
          <label class="form-field__label" for="offerChannel">Channel</label>
          <select class="form-field__input" id="offerChannel"></select>
          <p class="form-field__error" id="offerChannelError" hidden></p>
        </div>

        <div class="form-field">
          <label class="form-field__label">Content</label>
          <div class="content-type-toggle">
            <button type="button" class="content-type-toggle__btn content-type-toggle__btn--active" data-content-type="ready_file">Ready file</button>
            <button type="button" class="content-type-toggle__btn" data-content-type="brief">Brief</button>
          </div>
        </div>

        <div class="form-field" id="offerFileFieldWrap">
          <label class="form-field__label" for="offerCreativeFile">Creative (JPG, PNG, GIF, or WebP — max 2MB)</label>
          <input class="form-field__input" type="file" id="offerCreativeFile" accept="image/png,image/jpeg,image/gif,image/webp">
          <p class="form-field__error" id="offerCreativeFileError" hidden></p>
        </div>

        <div class="form-field" id="offerBriefFieldWrap" hidden>
          <label class="form-field__label" for="offerBriefText">Brief for the blogger</label>
          <textarea class="form-field__input" id="offerBriefText" rows="4" placeholder="What should the post cover? Key points, tone, hashtags…"></textarea>
          <p class="form-field__error" id="offerBriefTextError" hidden></p>
        </div>

        <div class="form-field">
          <label class="form-field__label" for="offerPrice">Offer price (EUR)</label>
          <input class="form-field__input" type="number" id="offerPrice" min="1" step="0.01">
          <p class="form-field__error" id="offerPriceError" hidden></p>
        </div>

        <div class="form-field">
          <label class="form-field__label" for="offerClickUrl">Click URL</label>
          <input class="form-field__input" type="url" id="offerClickUrl" placeholder="https://example.com/landing">
          <p class="form-field__error" id="offerClickUrlError" hidden></p>
        </div>

        <dl class="booking-summary" id="offerSummary"></dl>

        <div class="form-field" id="offerCardFieldWrap">
          <label class="form-field__label">Card details</label>
          <div id="offerCardElement" class="booking-card-element"></div>
          <p class="form-field__error" id="offerCardError" hidden></p>
        </div>

        <button type="submit" class="btn btn--purple btn--lg register-submit" id="offerPayBtn">Send offer &amp; Pay</button>
        <p class="form-message form-message--error" id="offerFormMessage" hidden></p>
      </form>
    </div>
  </div>

  <footer class="simple-footer">
    <div class="container simple-footer__inner">
      <span>© 2026 Vybridge</span>
    </div>
  </footer>
  <script src="/auth/i18n.js"></script>
  <script src="/auth/auth.js"></script>
  <script src="/bloggers/bloggers.js"></script>
</body>
</html>
