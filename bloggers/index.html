<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vybridge — Browse bloggers</title>
  <meta name="description" content="Browse bloggers and influencers on Vybridge.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/auth/auth.css">
  <link rel="stylesheet" href="/slots/slots.css">
  <link rel="stylesheet" href="/bloggers/bloggers.css">
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="/" class="logo">
        <img src="/assets/logo-icon.svg" alt="" class="logo__icon" width="36" height="36">
        <span class="logo__text">vybridge</span>
      </a>
      <div class="header__actions">
        <a href="/dashboard" class="header__login">Back to dashboard</a>
      </div>
    </div>
  </header>

  <main class="catalog-page">
    <div class="container">
      <h1 class="dashboard-title">Browse bloggers</h1>

      <div class="catalog-filters" id="catalogFilters" hidden>
        <div class="catalog-filters__field">
          <label class="catalog-filters__label" for="filterPlatform">Platform</label>
          <select class="catalog-filters__select" id="filterPlatform">
            <option value="">All platforms</option>
            <option value="instagram">📷 Instagram</option>
            <option value="tiktok">🎵 TikTok</option>
            <option value="youtube">▶️ YouTube</option>
          </select>
        </div>

        <div class="catalog-filters__field">
          <label class="catalog-filters__label" for="filterCategory">Category</label>
          <select class="catalog-filters__select" id="filterCategory">
            <option value="">All categories</option>
            <option value="technology">💻 Technology</option>
            <option value="lifestyle">🧘 Lifestyle</option>
            <option value="automotive">🚗 Automotive</option>
            <option value="fashion">👗 Fashion</option>
            <option value="food">🍔 Food</option>
            <option value="travel">✈️ Travel</option>
            <option value="sports">⚽ Sports</option>
            <option value="business">💼 Business</option>
            <option value="entertainment">🎬 Entertainment</option>
            <option value="education">🎓 Education</option>
            <option value="health">❤️ Health</option>
            <option value="news">📰 News</option>
            <option value="other">📦 Other</option>
          </select>
        </div>

        <div class="catalog-filters__field">
          <label class="catalog-filters__label" for="filterFollowers">Followers</label>
          <select class="catalog-filters__select" id="filterFollowers">
            <option value="">Any size</option>
            <option value="under_1k">Under 1,000</option>
            <option value="1k_10k">1,000 – 10,000</option>
            <option value="10k_50k">10,000 – 50,000</option>
            <option value="50k_200k">50,000 – 200,000</option>
            <option value="200k_plus">200,000+</option>
          </select>
        </div>
      </div>

      <p class="dashboard-loading" id="catalogLoading">Loading…</p>
      <div class="bloggers-grid" id="bloggersGrid" hidden></div>
      <p class="dashboard-empty" id="bloggersEmpty" hidden>No bloggers available right now — check back soon.</p>
      <p class="dashboard-empty" id="bloggersFilteredEmpty" hidden>No bloggers match these filters — try widening your search.</p>
    </div>
  </main>

  <div class="modal-backdrop" id="offerBackdrop" hidden>
    <div class="modal modal--lg" role="dialog" aria-modal="true" aria-labelledby="offerModalTitle">
      <button type="button" class="modal__close" id="offerModalCloseBtn" aria-label="Close">&times;</button>
      <h2 class="modal__title" id="offerModalTitle">Make an offer</h2>
      <p class="modal__subtitle" id="offerBloggerInfo"></p>

      <form id="offerForm" novalidate>
        <div class="form-field" id="offerChannelFieldWrap">
          <label class="form-field__label" for="offerChannel">Channel</label>
          <select class="form-field__input" id="offerChannel"></select>
          <p class="form-field__error" id="offerChannelError" hidden></p>
        </div>

        <div class="form-field">
          <label class="form-field__label">What are you promoting?</label>
          <div class="offer-type-grid" id="offerTypeGrid">
            <button type="button" class="offer-type-card" data-offer-type="product">
              <span class="offer-type-card__icon">📦</span>
              <span class="offer-type-card__title">Product</span>
              <span class="offer-type-card__desc">A physical or digital product</span>
            </button>
            <button type="button" class="offer-type-card" data-offer-type="website">
              <span class="offer-type-card__icon">🌐</span>
              <span class="offer-type-card__title">Website / Service</span>
              <span class="offer-type-card__desc">A site, app, or service</span>
            </button>
            <button type="button" class="offer-type-card" data-offer-type="other">
              <span class="offer-type-card__icon">🎯</span>
              <span class="offer-type-card__title">Other</span>
              <span class="offer-type-card__desc">Describe it in your own words</span>
            </button>
          </div>
          <p class="form-field__error" id="offerTypeError" hidden></p>
        </div>

        <div id="offerTypeFields" hidden>

          <!-- Product -->
          <div id="offerFieldsProduct" hidden>
            <div class="form-field">
              <label class="form-field__label" for="offerProductName">Product name</label>
              <input class="form-field__input" type="text" id="offerProductName" placeholder="e.g. Aroma Diffuser Pro">
              <p class="form-field__error" id="offerProductNameError" hidden></p>
            </div>

            <div class="form-field">
              <label class="form-field__label" for="offerProductImage">Product photo <span class="form-field__optional">(optional)</span></label>
              <input class="form-field__input" type="file" id="offerProductImage" accept="image/png,image/jpeg,image/gif,image/webp">
              <p class="form-field__error" id="offerProductImageError" hidden></p>
            </div>

            <div class="form-field">
              <label class="form-field__label">Ad format</label>
              <div class="ad-format-toggle">
                <button type="button" class="ad-format-toggle__btn" data-ad-format="reels">🎬 Reels/Video</button>
                <button type="button" class="ad-format-toggle__btn" data-ad-format="stories">📱 Stories</button>
                <button type="button" class="ad-format-toggle__btn" data-ad-format="post">📸 Post/Photo</button>
              </div>
              <p class="form-field__error" id="offerAdFormatProductError" hidden></p>
            </div>

            <div class="form-field">
              <label class="form-field__label" for="offerProductDescription">What would you like to see in the content?</label>
              <textarea class="form-field__input" id="offerProductDescription" rows="4" maxlength="500" placeholder="Describe in your own words. For example: “Unbox the product, show it up close, try using it and share your impressions.”"></textarea>
              <p class="form-field__char-count"><span id="offerProductDescriptionCount">0</span>/500</p>
              <p class="form-field__error" id="offerProductDescriptionError" hidden></p>
            </div>

            <label class="checkbox-field">
              <input type="checkbox" id="offerSendPhysicalProduct">
              <span>I'll send the blogger a physical product</span>
            </label>

            <div class="form-field" id="offerDeliveryInstructionsWrap" hidden>
              <label class="form-field__label" for="offerDeliveryInstructions">Delivery instructions</label>
              <textarea class="form-field__input" id="offerDeliveryInstructions" rows="3" placeholder="Address, shipping notes, timing…"></textarea>
              <p class="form-field__error" id="offerDeliveryInstructionsError" hidden></p>
            </div>
          </div>

          <!-- Website / Service -->
          <div id="offerFieldsWebsite" hidden>
            <div class="form-field">
              <label class="form-field__label" for="offerWebsiteName">Website/App name</label>
              <input class="form-field__input" type="text" id="offerWebsiteName" placeholder="e.g. Vybridge">
              <p class="form-field__error" id="offerWebsiteNameError" hidden></p>
            </div>

            <div class="form-field">
              <label class="form-field__label" for="offerWebsiteUrl">Website URL</label>
              <input class="form-field__input" type="url" id="offerWebsiteUrl" placeholder="https://example.com">
              <p class="form-field__error" id="offerWebsiteUrlError" hidden></p>
            </div>

            <div class="form-field">
              <label class="form-field__label">Ad format</label>
              <div class="ad-format-toggle">
                <button type="button" class="ad-format-toggle__btn" data-ad-format="reels">🎬 Reels/Video</button>
                <button type="button" class="ad-format-toggle__btn" data-ad-format="stories">📱 Stories</button>
                <button type="button" class="ad-format-toggle__btn" data-ad-format="post">📸 Post/Photo</button>
              </div>
              <p class="form-field__error" id="offerAdFormatWebsiteError" hidden></p>
            </div>

            <div class="form-field">
              <label class="form-field__label" for="offerWebsiteDescription">What would you like the blogger to say or show?</label>
              <textarea class="form-field__input" id="offerWebsiteDescription" rows="4" maxlength="500" placeholder="For example: “Visit the site, show the main features, explain why you’d recommend it.”"></textarea>
              <p class="form-field__char-count"><span id="offerWebsiteDescriptionCount">0</span>/500</p>
              <p class="form-field__error" id="offerWebsiteDescriptionError" hidden></p>
            </div>
          </div>

          <!-- Other -->
          <div id="offerFieldsOther" hidden>
            <div class="form-field">
              <label class="form-field__label" for="offerOtherDescription">Describe what you need</label>
              <textarea class="form-field__input" id="offerOtherDescription" rows="6" maxlength="1000" placeholder="Describe your campaign in your own words. No professional terms needed — just explain what you want."></textarea>
              <p class="form-field__char-count"><span id="offerOtherDescriptionCount">0</span>/1000</p>
              <p class="form-field__error" id="offerOtherDescriptionError" hidden></p>
            </div>

            <div class="form-field">
              <label class="form-field__label">Ad format</label>
              <div class="ad-format-toggle">
                <button type="button" class="ad-format-toggle__btn" data-ad-format="reels">🎬 Reels/Video</button>
                <button type="button" class="ad-format-toggle__btn" data-ad-format="stories">📱 Stories</button>
                <button type="button" class="ad-format-toggle__btn" data-ad-format="post">📸 Post/Photo</button>
              </div>
              <p class="form-field__error" id="offerAdFormatOtherError" hidden></p>
            </div>
          </div>

          <div class="form-field">
            <label class="form-field__label" for="offerPrice">Budget (EUR)</label>
            <input class="form-field__input" type="number" id="offerPrice" min="1" step="0.01">
            <p class="form-field__hint">The blogger may counter-offer a different price</p>
            <p class="form-field__error" id="offerPriceError" hidden></p>
          </div>

          <div class="form-field" id="offerClickUrlWrap">
            <label class="form-field__label" for="offerClickUrl">Click URL <span class="form-field__optional" id="offerClickUrlOptionalTag" hidden>(optional)</span></label>
            <input class="form-field__input" type="url" id="offerClickUrl" placeholder="https://example.com/landing">
            <p class="form-field__error" id="offerClickUrlError" hidden></p>
          </div>

          <dl class="booking-summary" id="offerSummary"></dl>

          <div class="form-field" id="offerCardFieldWrap">
            <label class="form-field__label">Card details</label>
            <div id="offerCardElement" class="booking-card-element"></div>
            <p class="form-field__error" id="offerCardError" hidden></p>
          </div>

          <button type="submit" class="btn btn--purple btn--lg register-submit" id="offerPayBtn">Send offer &amp; Pay</button>
          <p class="form-message form-message--error" id="offerFormMessage" hidden></p>
        </div>
      </form>
    </div>
  </div>

  <footer class="simple-footer">
    <div class="container simple-footer__inner">
      <span>© 2026 Vybridge</span>
    </div>
  </footer>
  <script src="/auth/i18n.js"></script>
  <script src="/auth/auth.js"></script>
  <script src="/bloggers/bloggers.js"></script>
</body>
</html>
