<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vybridge — Вхід</title>
  <meta name="description" content="Увійдіть до свого облікового запису Vybridge.">
  <link rel="alternate" hreflang="en" href="/login">
  <link rel="alternate" hreflang="uk" href="/uk/login">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/advertisers.css">
  <link rel="stylesheet" href="/auth/auth.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="/uk/index.html" class="logo">
        <img src="/assets/logo-icon.svg" alt="" class="logo__icon" width="36" height="36">
        <span class="logo__text">vybridge</span>
      </a>
      <nav class="nav" id="nav">
        <a href="/uk/how-it-works.html" class="nav__link">Як це працює</a>
        <a href="/uk/advertisers.html" class="nav__link">Для рекламодавців</a>
        <a href="/uk/publishers.html" class="nav__link">Для видавців</a>
      </nav>
      <div class="header__actions">
        <div class="lang-switch" aria-label="Мова">
          <a href="/login" class="lang-switch__link" hreflang="en">EN</a>
          <a href="/uk/login" class="lang-switch__link lang-switch__link--active" hreflang="uk" aria-current="page">UA</a>
        </div>
        <a href="/uk/register" class="btn btn--purple btn--sm">Реєстрація</a>
      </div>
      <button class="menu-toggle" id="menuToggle" aria-label="Відкрити меню" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <main class="auth-page">
    <div class="container">
      <div class="auth-card">
        <h1 class="auth-card__title">Вхід</h1>
        <p class="auth-card__subtitle">Увійдіть до свого облікового запису Vybridge.</p>

        <form id="loginForm" class="auth-form" novalidate>
          <div class="form-field">
            <label class="form-field__label" for="email">Email</label>
            <input class="form-field__input" type="email" id="email" name="email" autocomplete="email" required>
          </div>

          <div class="form-field">
            <label class="form-field__label" for="password">Пароль</label>
            <input class="form-field__input" type="password" id="password" name="password" autocomplete="current-password" required>
          </div>

          <button type="submit" class="btn btn--brand">Увійти</button>
          <p id="loginMessage" class="form-message" hidden></p>
        </form>

        <p class="auth-footer-link">Немає облікового запису? <a href="/uk/register">Реєстрація</a></p>
      </div>
    </div>
  </main>

  <footer id="vybridge-footer"></footer>
  <script src="/auth/i18n.js"></script>
  <script src="/auth/auth.js"></script>
  <script src="/login/login.js"></script>
  <script src="/assets/footer-templates.js"></script>
  <script src="/assets/footer.js"></script>
</body>
</html>
