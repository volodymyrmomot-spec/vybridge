<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vybridge — Browse ad slots</title>
  <meta name="description" content="Browse available ad slots on Vybridge.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/auth/auth.css">
  <link rel="stylesheet" href="/slots/slots.css">
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="/" class="logo">
        <img src="/assets/logo-icon.svg" alt="" class="logo__icon" width="36" height="36">
        <span class="logo__text">vybridge</span>
      </a>
      <div class="header__actions">
        <a href="/dashboard" class="header__login">Back to dashboard</a>
      </div>
    </div>
  </header>

  <main class="catalog-page">
    <div class="container">
      <h1 class="dashboard-title">Browse ad slots</h1>

      <div class="catalog-filters" id="catalogFilters" hidden>
        <div class="catalog-filters__field">
          <label class="catalog-filters__label" for="filterCategory">Category</label>
          <select class="catalog-filters__select" id="filterCategory">
            <option value="">All categories</option>
            <option value="technology">💻 Technology</option>
            <option value="lifestyle">🧘 Lifestyle</option>
            <option value="automotive">🚗 Automotive</option>
            <option value="fashion">👗 Fashion</option>
            <option value="food">🍔 Food</option>
            <option value="travel">✈️ Travel</option>
            <option value="sports">⚽ Sports</option>
            <option value="business">💼 Business</option>
            <option value="entertainment">🎬 Entertainment</option>
            <option value="education">🎓 Education</option>
            <option value="health">❤️ Health</option>
            <option value="news">📰 News</option>
            <option value="other">📦 Other</option>
          </select>
        </div>

        <div class="catalog-filters__field">
          <label class="catalog-filters__label" for="filterTraffic">Monthly visitors</label>
          <select class="catalog-filters__select" id="filterTraffic">
            <option value="">Any traffic</option>
            <option value="under_1k">Under 1,000</option>
            <option value="1k_10k">1,000 – 10,000</option>
            <option value="10k_50k">10,000 – 50,000</option>
            <option value="50k_200k">50,000 – 200,000</option>
            <option value="200k_plus">200,000+</option>
          </select>
        </div>

        <div class="catalog-filters__field">
          <label class="catalog-filters__label" for="filterCountry">Audience country</label>
          <select class="catalog-filters__select" id="filterCountry">
            <option value="">All countries</option>
          </select>
        </div>
      </div>

      <p class="dashboard-loading" id="catalogLoading">Loading…</p>
      <div class="slots-grid" id="slotsGrid" hidden></div>
      <p class="dashboard-empty" id="slotsEmpty" hidden>No ad slots available right now — check back soon.</p>
      <p class="dashboard-empty" id="slotsFilteredEmpty" hidden>No slots match these filters — try widening your search.</p>
    </div>
  </main>

  <div class="modal-backdrop" id="bookingBackdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button type="button" class="modal__close" id="modalCloseBtn" aria-label="Close">&times;</button>
      <h2 class="modal__title" id="modalTitle">Book this slot</h2>
      <p class="modal__subtitle" id="modalSlotInfo"></p>

      <form id="bookingForm" novalidate>
        <div class="form-field">
          <label class="form-field__label" for="creativeFile">Creative (JPG, PNG, GIF, or WebP — max 2MB)</label>
          <input class="form-field__input" type="file" id="creativeFile" accept="image/png,image/jpeg,image/gif,image/webp">
          <p class="form-field__error" id="creativeFileError" hidden></p>
        </div>

        <div class="form-field">
          <label class="form-field__label" for="creativeClickUrl">Click URL</label>
          <input class="form-field__input" type="url" id="creativeClickUrl" placeholder="https://example.com/landing">
          <p class="form-field__error" id="creativeClickUrlError" hidden></p>
        </div>

        <dl class="booking-summary" id="bookingSummary"></dl>

        <div class="form-field" id="cardFieldWrap">
          <label class="form-field__label">Card details</label>
          <div id="cardElement" class="booking-card-element"></div>
          <p class="form-field__error" id="cardError" hidden></p>
        </div>

        <button type="submit" class="btn btn--purple btn--lg register-submit" id="payBtn">Pay</button>
        <p class="form-message form-message--error" id="bookingFormMessage" hidden></p>
      </form>
    </div>
  </div>

  <footer class="simple-footer">
    <div class="container simple-footer__inner">
      <span>© 2026 Vybridge</span>
    </div>
  </footer>
  <script src="/auth/i18n.js"></script>
  <script src="/auth/auth.js"></script>
  <script src="/slots/slots.js"></script>
</body>
</html>
