<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vybridge — Create an ad slot</title>
  <meta name="description" content="Create a new ad slot on your site.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/auth/auth.css">
  <!-- Shares the register page's form/card layout rules (role-select cards
       aren't used here, but .register-page/.register-form/.form-field__error
       etc. are generic enough to reuse rather than duplicate). -->
  <link rel="stylesheet" href="/register/register.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="/" class="logo">
        <img src="/assets/logo-icon.svg" alt="" class="logo__icon" width="36" height="36">
        <span class="logo__text">vybridge</span>
      </a>
      <div class="header__actions">
        <a href="/dashboard" class="header__login">Back to dashboard</a>
      </div>
    </div>
  </header>

  <main class="register-page">
    <div class="container register-container">
      <h1 class="register-title">Create an ad slot</h1>

      <form id="newSlotForm" class="register-form" novalidate>
        <div class="form-field">
          <label class="form-field__label" for="slotLabel">Label</label>
          <input class="form-field__input" type="text" id="slotLabel" name="label" placeholder="e.g. Header banner" autocomplete="off">
          <p class="form-field__error" id="slotLabelError" hidden></p>
        </div>

        <div class="form-field">
          <label class="form-field__label" for="slotFormat">Ad size</label>
          <select class="form-field__input" id="slotFormat" name="format">
            <option value="">Select a size</option>
            <option value="728x90">Leaderboard (728×90)</option>
            <option value="300x250">Medium Rectangle (300×250)</option>
            <option value="320x50">Mobile Banner (320×50)</option>
            <option value="336x280">Large Rectangle (336×280)</option>
            <option value="160x600">Wide Skyscraper (160×600)</option>
            <option value="300x600">Half Page (300×600)</option>
            <option value="970x250">Billboard (970×250)</option>
          </select>
          <p class="form-field__error" id="slotFormatError" hidden></p>
        </div>

        <div class="form-field">
          <label class="form-field__label" for="slotPrice">Price (EUR)</label>
          <input class="form-field__input" type="number" id="slotPrice" name="priceEuros" min="1" step="0.01" placeholder="50.00" autocomplete="off">
          <p class="form-field__error" id="slotPriceError" hidden></p>
        </div>

        <div class="form-field">
          <label class="form-field__label" for="slotDuration">Placement duration (days)</label>
          <input class="form-field__input" type="number" id="slotDuration" name="durationDays" min="1" max="365" step="1" placeholder="30" autocomplete="off">
          <p class="form-field__error" id="slotDurationError" hidden></p>
        </div>

        <button type="submit" class="btn btn--purple btn--lg register-submit">Create slot</button>
        <p class="form-message form-message--error" id="newSlotFormMessage" hidden></p>
      </form>
    </div>
  </main>

  <footer class="simple-footer">
    <div class="container simple-footer__inner">
      <span>© 2026 Vybridge</span>
    </div>
  </footer>
  <script src="/auth/i18n.js"></script>
  <script src="/auth/auth.js"></script>
  <script src="/slots/new/new.js"></script>
</body>
</html>
