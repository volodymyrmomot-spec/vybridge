<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vybridge — Prihlásenie</title>
  <meta name="description" content="Prihláste sa do svojho účtu Vybridge.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../public/advertisers.css">
  <link rel="stylesheet" href="../auth/auth.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="../index.html" class="logo">
        <img src="../assets/logo-icon.svg" alt="" class="logo__icon" width="36" height="36">
        <span class="logo__text">vybridge</span>
      </a>
      <nav class="nav" id="nav">
        <a href="../how-it-works.html" class="nav__link">Ako to funguje</a>
        <a href="../public/advertisers.html" class="nav__link">Pre reklamodávateľov</a>
        <a href="../public/publishers.html" class="nav__link">Pre vydavateľov</a>
      </nav>
      <div class="header__actions">
        <a href="/register" class="btn btn--purple btn--sm">Registrácia</a>
      </div>
      <button class="menu-toggle" id="menuToggle" aria-label="Otvoriť menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <main class="auth-page">
    <div class="container">
      <div class="auth-card">
        <h1 class="auth-card__title">Prihlásenie</h1>
        <p class="auth-card__subtitle">Prihláste sa do svojho účtu Vybridge.</p>

        <form id="loginForm" class="auth-form" novalidate>
          <div class="form-field">
            <label class="form-field__label" for="email">Email</label>
            <input class="form-field__input" type="email" id="email" name="email" autocomplete="email" required>
          </div>

          <div class="form-field">
            <label class="form-field__label" for="password">Heslo</label>
            <input class="form-field__input" type="password" id="password" name="password" autocomplete="current-password" required>
          </div>

          <button type="submit" class="btn btn--brand">Prihlásiť sa</button>
          <p id="loginMessage" class="form-message" hidden></p>
        </form>

        <p class="auth-footer-link">Nemáte účet? <a href="/register">Registrácia</a></p>
      </div>
    </div>
  </main>

  <footer id="vybridge-footer"></footer>
  <script src="../auth/auth.js"></script>
  <script src="login.js"></script>
  <script src="../assets/footer-templates.js"></script>
  <script src="../assets/footer.js"></script>
</body>
</html>
