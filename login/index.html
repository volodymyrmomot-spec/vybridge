<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vybridge — Log in</title>
  <meta name="description" content="Sign in to your Vybridge account.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/auth/page.css">
  <link rel="stylesheet" href="/auth/auth.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="/index.html" class="logo">
        <img src="/assets/logo-icon.svg" alt="" class="logo__icon" width="36" height="36">
        <span class="logo__text">vybridge</span>
      </a>
      <div class="header__actions">
        <a href="/register" class="btn btn--brand btn--sm">Sign up</a>
      </div>
    </div>
  </header>

  <main class="auth-page">
    <div class="container">
      <div class="auth-card">
        <h1 class="auth-card__title">Log in</h1>
        <p class="auth-card__subtitle">Sign in to your Vybridge account.</p>

        <form id="loginForm" class="auth-form" novalidate>
          <div class="form-field">
            <label class="form-field__label" for="email">Email</label>
            <input class="form-field__input" type="email" id="email" name="email" autocomplete="email" required>
          </div>

          <div class="form-field">
            <label class="form-field__label" for="password">Password</label>
            <input class="form-field__input" type="password" id="password" name="password" autocomplete="current-password" required>
          </div>

          <button type="submit" class="btn btn--brand">Log in</button>
          <p id="loginMessage" class="form-message" hidden></p>
        </form>

        <p class="auth-footer-link">Don't have an account? <a href="/register">Sign up</a></p>
      </div>
    </div>
  </main>

  <footer class="simple-footer">
    <div class="container simple-footer__inner">
      <span>© 2026 Vybridge</span>
    </div>
  </footer>
  <script src="/auth/i18n.js"></script>
  <script src="/auth/auth.js"></script>
  <script src="/login/login.js"></script>
</body>
</html>
